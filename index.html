<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Food Calorie Estimator</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: white; border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px 36px; max-width: 460px; width: 100%;
    }
    h1 { text-align: center; font-size: 1.8rem; color: #333; margin-bottom: 4px; }
    .subtitle { text-align: center; color: #999; font-size: 0.88rem; margin-bottom: 30px; }
    .upload-area {
      border: 2.5px dashed #c3cfe2; border-radius: 16px;
      padding: 30px 20px; text-align: center; cursor: pointer;
      transition: all 0.2s; margin-bottom: 20px;
      position: relative; background: #f9fbff;
    }
    .upload-area:hover { border-color: #667eea; background: #f0f4ff; }
    .upload-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0;
      cursor: pointer; width: 100%; height: 100%;
    }
    .upload-area .icon { font-size: 3rem; margin-bottom: 10px; }
    .upload-area p { color: #aaa; font-size: 0.9rem; }
    #preview {
      width: 100%; max-height: 240px; object-fit: contain;
      border-radius: 14px; display: none;
      margin-bottom: 20px; border: 2px solid #eee;
    }
    #status-bar {
      background: #f0f4ff; border-left: 4px solid #667eea;
      border-radius: 10px; padding: 12px 16px;
      font-size: 0.85rem; color: #555; margin-bottom: 20px;
    }
    #result-box {
      display: none; border-radius: 18px; overflow: hidden;
      margin-bottom: 20px; box-shadow: 0 8px 24px rgba(102,126,234,0.3);
    }
    .result-top {
      background: linear-gradient(135deg, #667eea, #764ba2);
      padding: 24px; text-align: center; color: white;
    }
    .result-top .label { font-size: 0.85rem; opacity: 0.8; margin-bottom: 4px; }
    .result-top .food-name { font-size: 1.6rem; font-weight: 800; text-transform: capitalize; margin-bottom: 4px; }
    .result-top .confidence { font-size: 0.8rem; opacity: 0.7; }
    .result-bottom { background: #1a1a2e; padding: 20px; text-align: center; color: white; }
    .result-bottom .cal-label { font-size: 0.8rem; color: #aaa; margin-bottom: 4px; }
    .result-bottom .calories { font-size: 3.5rem; font-weight: 900; color: #ffd700; line-height: 1; }
    .result-bottom .unit { font-size: 0.9rem; color: #aaa; margin-top: 4px; }
    .not-found { background: #fff3cd; border-radius: 10px; padding: 10px 14px; font-size: 0.82rem; color: #856404; margin-bottom: 12px; display: none; }
    .tip-box {
      display: none; background: #fff8e1;
      border-left: 4px solid #ffc107; border-radius: 10px;
      padding: 12px 16px; font-size: 0.82rem;
      color: #7a6000; margin-bottom: 20px;
    }
    .all-predictions { display: none; margin-bottom: 20px; }
    .all-predictions h3 { font-size: 0.82rem; color: #aaa; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.05em; }
    .pred-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .pred-label { font-size: 0.8rem; color: #555; width: 130px; flex-shrink: 0; }
    .pred-bar-bg { flex: 1; height: 8px; background: #eee; border-radius: 99px; overflow: hidden; }
    .pred-bar { height: 100%; background: linear-gradient(90deg,#667eea,#764ba2); border-radius: 99px; transition: width 0.5s ease; }
    .pred-pct { font-size: 0.75rem; color: #888; width: 36px; text-align: right; }
    .btn-reset {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 14px;
      font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s; display: none;
    }
    .btn-reset:hover { opacity: 0.9; }
    #debug-box {
      background: #f8f9fa; border: 1px dashed #ccc;
      border-radius: 8px; padding: 10px 14px;
      font-size: 0.78rem; color: #888;
      margin-bottom: 16px; display: none;
      font-family: monospace;
    }
  </style>
</head>
<body>
<div class="card">
  <h1>🍽️ Food Calorie Estimator</h1>
  <p class="subtitle">Upload a food image — AI detects the dish & shows calories</p>

  <div class="upload-area" id="uploadArea">
    <div class="icon">📸</div>
    <p>Click here to upload a food image</p>
    <input type="file" id="imageUpload" accept="image/*" />
  </div>

  <img id="preview" alt="Uploaded food" />
  <div id="status-bar">⏳ Loading AI model, please wait...</div>
  <div id="debug-box"></div>

  <div id="result-box">
    <div class="result-top">
      <div class="label">Detected Food</div>
      <div class="food-name" id="res-food">—</div>
      <div class="confidence" id="res-conf"></div>
    </div>
    <div class="result-bottom">
      <div class="cal-label">Estimated Calories (per serving)</div>
      <div class="calories" id="res-cal">—</div>
      <div class="unit">kcal</div>
    </div>
  </div>

  <div class="not-found" id="not-found-box"></div>
  <div class="tip-box" id="tip-box"></div>

  <div class="all-predictions" id="all-pred">
    <h3>All predictions</h3>
    <div id="pred-bars"></div>
  </div>

  <button class="btn-reset" id="resetBtn" onclick="resetApp()">🔄 Try Another Image</button>
</div>

<script>

  const TM_MODEL_URL = "https://teachablemachine.withgoogle.com/models/XAO-tTfCG/";

  // ✅ STATIC CALORIE DATA
  // Keys must EXACTLY match your Teachable Machine class names

  const calorieMap = {
    // --- YOUR MODEL CLASSES (add/edit as needed) ---
    "IDLY":           58,
    "idly":           58,
    "Idly":           58,
    "Jilebi":         150,
    "jilebi":         150,
    "burger":         295,
    "Burger":         295,
    "Masal...Dosa":   387,

    "Masala Dosa":    387,
    "masala dosa":    387,
    "MasalaDosa":     387,
    "paani_puri":     60,
    "Paani Puri":     60,

    "dhokla":         160,

    "butter_naan":    300,

    "DalMakhani":     340,
  };

  const tipMap = {

    "idly":         "💡 Idly is low-fat & easy to digest — great for breakfast!",

    "Masal...Dosa": "💡 Masala Dosa has a good mix of carbs and protein.",
    "masala_dosa":  "💡 Masala Dosa has a good mix of carbs and protein.",
    "Masala Dosa":  "💡 Masala Dosa has a good mix of carbs and protein.",
    "paani_puri":   "💡 Paani Puri is a light snack — watch the chutney calories!",
    "dhokla":       "💡 Dhokla is a healthy steamed snack, rich in protein.",
    "butter_naan":  "💡 Butter Naan is calorie-dense. Pair with dal for balance.",
    "pizza":        "💡 Thin crust pizza with veggies is the healthier choice.",

  };

  let model;

  const statusBar    = document.getElementById("status-bar");
  const imageUpload  = document.getElementById("imageUpload");
  const preview      = document.getElementById("preview");
  const resultBox    = document.getElementById("result-box");
  const resFoodEl    = document.getElementById("res-food");
  const resCalEl     = document.getElementById("res-cal");
  const resConfEl    = document.getElementById("res-conf");
  const tipBox       = document.getElementById("tip-box");
  const allPred      = document.getElementById("all-pred");
  const predBars     = document.getElementById("pred-bars");
  const resetBtn     = document.getElementById("resetBtn");
  const uploadArea   = document.getElementById("uploadArea");
  const debugBox     = document.getElementById("debug-box");
  const notFoundBox  = document.getElementById("not-found-box");

  async function loadModel() {
    try {
      model = await tmImage.load(
        TM_MODEL_URL + "model.json",
        TM_MODEL_URL + "metadata.json"
      );
      statusBar.textContent = "✅ Model ready! Upload a food image above.";
      statusBar.style.borderColor = "#4caf50";
      statusBar.style.background  = "#f0fff4";
    } catch (e) {
      statusBar.textContent = "❌ Failed to load model. Check your internet connection.";
      statusBar.style.borderColor = "#f44336";
      console.error(e);
    }
  }

  async function predictImage(imgEl) {
    if (!model) return;
    statusBar.textContent = "🔍 Analysing your food image...";
    statusBar.style.borderColor = "#ff9800";
    statusBar.style.background  = "#fff8f0";

    const predictions = await model.predict(imgEl);
    predictions.sort((a, b) => b.probability - a.probability);

    const top  = predictions[0];
    const name = top.className;
    const conf = top.probability;

    // Show debug so you can see EXACT class name from model
    debugBox.style.display = "block";
    debugBox.textContent = `🔎 Model returned class: "${name}" — add this exact name to calorieMap if missing`;

    // Lookup calories — try exact, then lowercase
    const cal = calorieMap[name] ?? calorieMap[name.toLowerCase()] ?? null;

    resFoodEl.textContent = name;
    resConfEl.textContent = `Confidence: ${(conf * 100).toFixed(1)}%`;

    if (cal !== null) {
      resCalEl.textContent = cal;
      notFoundBox.style.display = "none";
    } else {
      resCalEl.textContent = "—";
      notFoundBox.textContent = `⚠️ Calorie data not found for "${name}". Add it to calorieMap in the HTML.`;
      notFoundBox.style.display = "block";
    }

    resultBox.style.display = "block";

    // Tip
    const tip = tipMap[name] ?? tipMap[name.toLowerCase()];
    if (tip) {
      tipBox.textContent   = tip;
      tipBox.style.display = "block";
    }

    // Probability bars
    predBars.innerHTML = "";
    predictions.forEach(p => {
      const pct = (p.probability * 100).toFixed(1);
      predBars.innerHTML += `
        <div class="pred-row
